name: CI

on:
  push:
    branches: [development, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Format, lint, and test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            cmake pkg-config libgl1-mesa-dev libwayland-dev libx11-dev \
            libxcursor-dev libxi-dev libxkbcommon-dev libxrandr-dev
      - name: Prepare Rust toolchain
        run: rustup component add rustfmt clippy
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --locked
      - name: Check release-only code paths
        run: cargo check --release --locked -p forge-gui --bin forge-ide
