name: Release packages

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: Linux AppImage (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            cmake file libfuse2 pkg-config libgl1-mesa-dev libwayland-dev \
            libx11-dev libxcursor-dev libxi-dev libxkbcommon-dev libxrandr-dev
      - name: Build AppImage
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "forge-gui") | .version')
          ./packaging/linux/build-appimage.sh "$VERSION"
      - uses: actions/upload-artifact@v7
        with:
          name: forge-linux-x86_64
          path: target/release-packages/*.AppImage
          if-no-files-found: error

  windows:
    name: Windows EXE (x86_64)
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v7
      - name: Build executable
        shell: pwsh
        run: |
          cargo build --release --locked -p forge-gui --bin forge-ide
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $version = ($metadata.packages | Where-Object name -eq "forge-gui").version
          New-Item -ItemType Directory -Force target/release-packages | Out-Null
          Copy-Item target/release/forge-ide.exe "target/release-packages/Forge-$version-windows-x86_64.exe"
      - uses: actions/upload-artifact@v7
        with:
          name: forge-windows-x86_64
          path: target/release-packages/*.exe
          if-no-files-found: error

  macos:
    name: macOS DMG (Apple Silicon)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - name: Build disk image
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "forge-gui") | .version')
          ./packaging/macos/build-dmg.sh "$VERSION"
      - uses: actions/upload-artifact@v7
        with:
          name: forge-macos-arm64
          path: target/release-packages/*.dmg
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows, macos]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - name: Validate tag against Cargo version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "forge-gui") | .version')
          test "$GITHUB_REF_NAME" = "v$VERSION"
      - uses: actions/download-artifact@v8
        with:
          pattern: forge-*
          path: dist
          merge-multiple: true
      - name: Publish checksummed assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          gh release create "$GITHUB_REF_NAME" ./* --generate-notes --title "Forge $GITHUB_REF_NAME"
